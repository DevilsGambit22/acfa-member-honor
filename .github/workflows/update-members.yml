name: Update Member Spotlight

on:
  workflow_dispatch:

  schedule:
    - cron: "17 14 * * 1"

permissions:
  contents: write

jobs:
  update-spotlight:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run spotlight updater
        run: node scripts/update-spotlight.js

      - name: Commit updated member data
        run: |
          git config user.name "ACFA Automation"
          git config user.email "actions@users.noreply.github.com"

          git add data/spotlight.json data/history.json

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Update weekly member spotlight"
          git push
